version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    PYTHONPATH: /workspace
    DBT_PROFILES_DIR: /workspace/dbt
  volumes:
    - ..:/workspace:cached
    - duckdb_data:/workspace/data
    - ../dags:/opt/airflow/dags
    - ../logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  shm_size: '2gb'

services:
  dev:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - duckdb_data:/workspace/data
    command: sleep infinity
    environment:
      - PYTHONPATH=/workspace
      - DBT_PROFILES_DIR=/workspace/dbt
    shm_size: '2gb'

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8081:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    restart: always

volumes:
  duckdb_data:
  postgres_data: