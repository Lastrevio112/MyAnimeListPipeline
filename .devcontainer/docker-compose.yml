version: '3.8'

services:
  dev:
    build:
      context: ..
      dockerfile: Dockerfile
    
    volumes:
      - ..:/workspace:cached
      - duckdb_data:/workspace/data

    # Keep the container alive
    command: sleep infinity
    
    environment:
      - PYTHONPATH=/workspace
      - DBT_PROFILES_DIR=/workspace/dbt
    
    # Needed for some DuckDB operations
    shm_size: '2gb'

volumes:
  duckdb_data: